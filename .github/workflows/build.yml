name: Build and Dispatch Adaptive

on:
  workflow_dispatch:
    inputs:
      branch_input:
        description: 'Branch to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - Piers
          - Omega

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.branch_input }}" == "both" ]; then
            echo 'matrix={"branch": ["Piers", "Omega"], "platform": ["linux64", "win64", "android-arm64", "osx64"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"branch": ["${{ github.event.inputs.branch_input }}"], "platform": ["linux64", "win64", "android-arm64", "osx64"]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    name: Build ${{ matrix.branch }} on ${{ matrix.platform }}
    runs-on: ${{ (matrix.platform == 'win64' && 'windows-2022') || (matrix.platform == 'osx64' && 'macos-latest') || 'ubuntu-22.04' }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/inputstream.adaptive
          ref: ${{ matrix.branch == 'Piers' && ('inputstream.adaptive' == 'inputstream.ffmpegdirect' || 'inputstream.adaptive' == 'inputstream.adaptive') && 'Piers' || (matrix.branch == 'Piers' && 'master' || 'Omega') }}
          path: source/inputstream.adaptive
          fetch-depth: 1

      - name: Install System Dependencies
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt update
            sudo apt install -y build-essential autoconf automake autopoint gettext cmake curl gawk gperf python3-dev libtool zip unzip
          elif [ "${{ runner.os }}" == "Windows" ]; then
            choco install cmake ninja nasm zip -y
          elif [ "${{ runner.os }}" == "macOS" ]; then
            brew install cmake ninja nasm
          fi

      - name: Build and Package
        run: |
          # Get Version for directory structure
          if [ -f source/inputstream.adaptive/version.txt ]; then
            VERSION=$(grep "VERSION_CODE" source/inputstream.adaptive/version.txt | awk '{print $2}')
          else
            VERSION="v-$(date +'%Y%m%d')"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Target Directory: ./compiled/os/version/
          OUT_DIR="compiled/${{ matrix.platform }}/$VERSION"
          mkdir -p "$OUT_DIR"
          echo "OUT_DIR=$OUT_DIR" >> $GITHUB_ENV

          if [ "True" == "True" ]; then
            echo "🚀 Performing C++ Build for ${{ matrix.platform }}..."
            if [ "inputstream.adaptive" == "xbmc" ]; then
              if [ "${{ matrix.platform }}" == "linux64" ]; then
                mkdir build && cd build
                cmake ../source/xbmc -DCMAKE_INSTALL_PREFIX=../$OUT_DIR -DAPP_RENDER_SYSTEM=gl
                make -j$(nproc) install
              else
                # Non-linux platforms use depends
                cd source/xbmc/tools/depends && ./bootstrap
                ./configure --prefix=$(pwd)/../../../../xbmc-deps
                make -j$(nproc || sysctl -n hw.ncpu)
                cd ../../../
                mkdir build && cd build
                cmake ../source/xbmc -DCMAKE_INSTALL_PREFIX=../$OUT_DIR -DCMAKE_PREFIX_PATH=$(pwd)/../xbmc-deps
                make -j$(nproc || sysctl -n hw.ncpu) install
              fi
            else
              mkdir build && cd build
              cmake ../source/inputstream.adaptive -DCMAKE_INSTALL_PREFIX=../$OUT_DIR
              make -j$(nproc || sysctl -n hw.ncpu) install
            fi
          else
            echo "📦 Packaging Python/XML Addon..."
            cp -rv source/inputstream.adaptive/* "$OUT_DIR/"
            touch "$OUT_DIR/.kodi_build_marker"
          fi

      - name: Create Archive
        run: |
          TAG="v-${{ env.VERSION }}-${{ matrix.branch }}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          FILENAME="inputstream.adaptive-${{ matrix.platform }}-${{ env.VERSION }}-${{ matrix.branch }}"
          if [ "${{ matrix.platform }}" == "linux64" ]; then
            tar -czf "$FILENAME.tar.gz" -C "$OUT_DIR" .
            echo "FILE=$FILENAME.tar.gz" >> $GITHUB_ENV
          else
            cd "$OUT_DIR" && zip -r "../../$FILENAME.zip" .
            cd ../../..
            echo "FILE=$FILENAME.zip" >> $GITHUB_ENV
          fi

      - name: Dispatch / Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT secret not found. Skipping release step."
            exit 0
          fi
          
          # Create local release in this repo
          gh release create "$TAG" $FILE \
            --title "Adaptive ${{ matrix.branch }} Build $TAG" \
            --notes "Automated build for ${{ matrix.platform }}." \
            --prerelease || \
          gh release upload "$TAG" $FILE --clobber

